<!DOCTYPE html>
<html lang=en>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <style>
            body {
                display: none; 
                margin: 0;
            }

            img {
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                transition: transform 1s ease-in-out; /* smooth transition */
            }
        </style>
    </head>


    <body>
        <img src="anika.jpeg" id="myImage">
        <script>
            if (Math.random() < 0.20) {
                // make image appear
                document.body.style.display="block"

                // trigger zoom
                requestAnimationFrame(() => {
                    document.getElementById('myImage').style.transform = "scale(1.3)";
                });
                
                setTimeout(() => {
                    window.location.href="https://www.instagram.com/anikabeatriceho/";}, 1000);

            } else {
                window.location.href="https://www.instagram.com/anikabeatriceho/";
            }
        </script>
    </body>
</html>
