<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <style>
            body {
                display: none;
                margin: 0;
            }

            img {
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                transition: transform 1s ease-in-out;
            }
        </style>
    </head>


    <body>
        <img src="hillary.jpeg" id="myImage">

        <script>
            if (Math.random() < 0.25) {
                // make image appear
                document.body.style.display="block";

                // trigger zoom
                requestAnimationFrame(() => {
                    document.getElementById("myImage").style.transform = "scale(1.5)";
                });

                // redirect to IG after 1 second + make image disappear
                setTimeout(() => {
                    window.location.href="https://www.instagram.com/veryhotgremlin/";
                    document.body.style.display="none";}, 1000);
                
            } else {
                window.location.href="https://www.instagram.com/veryhotgremlin/";
            }
        </script>
    </body>
</html>
